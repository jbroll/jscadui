<!DOCTYPE html>
<html>
<head>
  <title>Params Proxy Demo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      background: #1a1a2e;
      color: #eee;
    }
    h1 { color: #00d9ff; }

    .breadcrumb {
      background: #16213e;
      padding: 10px 15px;
      border-radius: 6px;
      margin-bottom: 20px;
    }
    .breadcrumb span {
      color: #888;
      cursor: pointer;
    }
    .breadcrumb span:hover {
      color: #00d9ff;
    }
    .breadcrumb span.current {
      color: #00d9ff;
      font-weight: bold;
    }
    .breadcrumb .type {
      color: #666;
      font-size: 0.85em;
    }
    .breadcrumb .sep {
      color: #444;
      margin: 0 8px;
    }

    .params {
      background: #16213e;
      padding: 20px;
      border-radius: 6px;
      margin-bottom: 20px;
    }
    .param-row {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }
    .param-row label {
      width: 120px;
      color: #aaa;
    }
    .param-row input {
      flex: 1;
      padding: 8px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #0f0f23;
      color: #fff;
    }
    .param-row input:focus {
      outline: none;
      border-color: #00d9ff;
    }
    .param-row .value {
      width: 50px;
      text-align: right;
      color: #00d9ff;
      margin-left: 10px;
    }

    .children {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .child-link {
      display: inline-flex;
      align-items: center;
      background: #16213e;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid #333;
      transition: all 0.15s;
    }
    .child-link:hover {
      border-color: #00d9ff;
      background: #1a2744;
    }
    .child-link .name {
      color: #fff;
      font-weight: bold;
    }
    .child-link .type {
      color: #00d9ff;
      font-size: 0.85em;
      margin-left: 8px;
      opacity: 0.7;
    }
    .no-children {
      color: #444;
      font-style: italic;
    }

    .output {
      background: #0f0f23;
      padding: 15px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      max-height: 300px;
      overflow: auto;
    }

    #hidden-toggle {
      color: #666;
      cursor: pointer;
      font-size: 0.9em;
      margin-top: 10px;
    }
    #hidden-toggle:hover {
      color: #00d9ff;
    }
    .hidden-params {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #333;
    }
    .hidden-params .param-row label {
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Params Proxy Demo</h1>

  <div id="breadcrumb" class="breadcrumb"></div>

  <div id="children" class="children" style="margin-bottom: 20px;">
    <div id="child-list"></div>
  </div>

  <div id="params" class="params">
    <h3>Parameters</h3>
    <div id="param-list"></div>
    <div id="hidden-toggle">▶ Show hidden parameters</div>
    <div id="hidden-params" class="hidden-params" style="display:none"></div>
  </div>

  <h3>State</h3>
  <div id="output" class="output"></div>

  <script type="module">
    import {
      createParamsProxy,
      createProxyState,
      buildParamTree,
      getBreadcrumbs,
      getParamsAtPath,
      getChildParts,
      getNodeByPath
    } from '../src/createParamsProxy.js'

    // Simulated JSCAD parts
    const wheel = (params) => {
      params._type = 'Wheel'
      params.radius = { default: 5, min: 1, max: 20, step: 0.5 }
      params.width = { default: 2, min: 0.5, max: 10 }
      params.spokes = { default: 5, min: 3, max: 12 }
      // Use hidden offset from parent
      console.log(`Wheel at offset ${params._offset}`)
      return { type: 'cylinder', radius: params.radius, height: params.width }
    }

    const axle = (params) => {
      params._type = 'Axle'
      params.length = { default: 20, min: 5, max: 50 }
      params.diameter = { default: 1, min: 0.5, max: 3 }

      // Computed hidden values
      params.left._offset = -params.length / 2
      params.right._offset = params.length / 2

      return [
        { type: 'cylinder', radius: params.diameter / 2, height: params.length },
        wheel(params.left),
        wheel(params.right)
      ]
    }

    const main = (params) => {
      params._type = 'Car'
      params.wheelbase = { default: 40, min: 20, max: 80 }
      params.color = { default: 'red' }

      return [
        axle(params.front),
        axle(params.rear)
      ]
    }

    // App state
    let currentPath = ''
    let uiValues = {}
    let userInteracted = new Set()
    let state, tree

    function runModel() {
      state = createProxyState(uiValues, userInteracted)
      const params = createParamsProxy(state)

      // Run the model
      const result = main(params)

      // Build tree
      tree = buildParamTree(state.discovered, state.types)

      return result
    }

    function render() {
      runModel()
      renderBreadcrumb()
      renderParams()
      renderChildren()
      renderOutput()
    }

    function renderBreadcrumb() {
      const crumbs = getBreadcrumbs(currentPath, state.types)
      const el = document.getElementById('breadcrumb')

      el.innerHTML = crumbs.map((crumb, i) => {
        const isLast = i === crumbs.length - 1
        const typeStr = crumb.type ? `<span class="type">(${crumb.type})</span>` : ''
        const name = crumb.name === 'root' ? '🏠' : crumb.name
        return `
          <span class="${isLast ? 'current' : ''}" data-path="${crumb.path}">
            ${name} ${typeStr}
          </span>
          ${isLast ? '' : '<span class="sep">›</span>'}
        `
      }).join('')

      // Click handlers
      el.querySelectorAll('span[data-path]').forEach(span => {
        span.onclick = () => {
          currentPath = span.dataset.path
          render()
        }
      })
    }

    function renderParams() {
      const params = getParamsAtPath(state.discovered, currentPath, false)
      const hiddenParams = getParamsAtPath(state.discovered, currentPath, true)
        .filter(p => p.hidden)

      const el = document.getElementById('param-list')
      el.innerHTML = params.map(p => renderParamInput(p)).join('')

      // Hidden params
      const hiddenEl = document.getElementById('hidden-params')
      const toggleEl = document.getElementById('hidden-toggle')

      if (hiddenParams.length > 0) {
        toggleEl.style.display = 'block'
        hiddenEl.innerHTML = hiddenParams.map(p => renderParamInput(p)).join('')

        toggleEl.onclick = () => {
          const visible = hiddenEl.style.display !== 'none'
          hiddenEl.style.display = visible ? 'none' : 'block'
          toggleEl.textContent = visible ? '▶ Show hidden parameters' : '▼ Hide hidden parameters'
        }
      } else {
        toggleEl.style.display = 'none'
        hiddenEl.style.display = 'none'
      }

      // Attach input handlers
      el.querySelectorAll('input').forEach(attachInputHandler)
      hiddenEl.querySelectorAll('input').forEach(attachInputHandler)
    }

    function renderParamInput(p) {
      const value = uiValues[p.path] ?? p.default

      if (p.type === 'checkbox') {
        return `
          <div class="param-row">
            <label>${p.name}</label>
            <input type="checkbox" data-path="${p.path}" ${value ? 'checked' : ''}>
          </div>
        `
      }

      if (p.type === 'number' || p.type === 'int') {
        return `
          <div class="param-row">
            <label>${p.name}</label>
            <input type="range"
              data-path="${p.path}"
              value="${value}"
              min="${p.min ?? 0}"
              max="${p.max ?? 100}"
              step="${p.step ?? (p.type === 'int' ? 1 : 0.1)}">
            <span class="value">${value}</span>
          </div>
        `
      }

      return `
        <div class="param-row">
          <label>${p.name}</label>
          <input type="text" data-path="${p.path}" value="${value}">
        </div>
      `
    }

    function attachInputHandler(input) {
      const update = () => {
        const path = input.dataset.path
        let value = input.type === 'checkbox' ? input.checked :
                    input.type === 'range' ? parseFloat(input.value) : input.value

        uiValues[path] = value
        userInteracted.add(path)

        // Update value display for range inputs
        const valueSpan = input.parentElement.querySelector('.value')
        if (valueSpan) valueSpan.textContent = value
      }

      // Update on every input (while sliding)
      input.oninput = () => {
        update()
        // Re-run model to update computed values, but don't re-render inputs
        runModel()
        renderOutput()
      }

      // Full re-render only on change (mouse release)
      input.onchange = () => {
        update()
        render()
      }
    }

    function renderChildren() {
      const node = getNodeByPath(tree, currentPath)
      const children = node ? Object.values(node.children) : []

      const el = document.getElementById('child-list')

      if (children.length === 0) {
        el.innerHTML = '<span style="color:#666">No child parts</span>'
        return
      }

      el.innerHTML = children.map(child => `
        <div class="child-link" data-path="${child.path}">
          <span class="name">${child.name}</span>
          ${child.type ? `<span class="type">${child.type}</span>` : ''}
        </div>
      `).join('')

      el.querySelectorAll('.child-link').forEach(link => {
        link.onclick = () => {
          currentPath = link.dataset.path
          render()
        }
      })
    }

    function renderOutput() {
      const el = document.getElementById('output')
      el.textContent = JSON.stringify({
        currentPath,
        discoveredCount: state.discovered.length,
        discoveredPaths: state.discovered.map(d => d.path),
        types: Object.fromEntries(state.types),
        uiValues,
        userInteracted: [...userInteracted]
      }, null, 2)
    }

    // Initial render
    render()
  </script>
</body>
</html>
