# simple-ci project config for jscadui
# Sourced by ci-push.sh when run from this directory.

CI_HOST=gpu
CI_REMOTE_SCRIPT=~/src/simple-ci/ci-rsync.sh
CI_SERVER_URL=http://gpu:8080

# bosl, bosl2, and snippet examples are gitignored (generated from corpus)
# but are required for the openscad comparison test suite.
# These --include rules must come before --filter=':- .gitignore' to override.
CI_RSYNC_ARGS="
  --include=/apps/
  --include=/apps/jscad-web/
  --include=/apps/jscad-web/examples/
  --include=/apps/jscad-web/examples/openscad/
  --include=/apps/jscad-web/examples/openscad/bosl/
  --include=/apps/jscad-web/examples/openscad/bosl/**
  --include=/apps/jscad-web/examples/openscad/bosl2/
  --include=/apps/jscad-web/examples/openscad/bosl2/**
  --include=/apps/jscad-web/examples/openscad/snippet/
  --include=/apps/jscad-web/examples/openscad/snippet/**
  --include=/apps/jscad-web/examples/openscad/dotscad/
  --include=/apps/jscad-web/examples/openscad/dotscad/**
"
